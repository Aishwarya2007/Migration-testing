name: TrainingSpace/TrainingSpace-ASP.NET_Core-CI
on:
  workflow_dispatch:
env:
  BuildConfiguration: Release
  BuildPlatform: any cpu
  Parameters_RestoreBuildProjects: "**/*.csproj"
  Parameters_TestProjects: "**/*[Tt]ests/*.csproj"
  system_debug: 'false'
jobs:
  Job_1:
    name: Agent job 1
    runs-on: windows-2019
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - name: Restore
      run: |-
        dotnet nuget add source "https://pkgs.dev.azure.com/aishuraja20/_packaging/bbbe7aa9-4331-4674-8163-53b21f3b154d/nuget/v3/index.json" --name "bbbe7aa9-4331-4674-8163-53b21f3b154d" --username "n/a" --password "${{ secrets.AZURE_DEVOPS_TOKEN }}" --store-password-in-clear-text
        dotnet restore ${{ env.Parameters_RestoreBuildProjects }} --verbosity "Detailed"
    - name: Build
      run: dotnet build ${{ env.Parameters_RestoreBuildProjects }} --configuration ${{ env.BuildConfiguration }}
    - name: Use .NET Core sdk
      uses: actions/setup-dotnet@v4.0.0
    - name: Test
      run: dotnet test ${{ env.Parameters_TestProjects }} --logger trx --results-directory "${{ runner.temp }}" --configuration ${{ env.BuildConfiguration }}
    - name: Test
      uses: NasAmin/trx-parser@v0.5.0
      if: always()
      with:
        TRX_PATH: "${{ runner.temp }}"
        REPO_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    - name: Publish
      run: dotnet publish ${{ env.Parameters_RestoreBuildProjects }} --configuration ${{ env.BuildConfiguration }} --output ${{ runner.temp }}
    - name: Publish Artifact
      if: success() || failure()
      uses: actions/upload-artifact@v4.1.0
      with:
        name: drop
        path: "\\\\my\\share\\${{ github.workflow }}\\${{ github.run_number }}"
    # NuGet does not accept glob patterns. Consider specifying files directly or using a solution.
    - name: NuGet restore
      run: nuget restore **/*.sln -Verbosity "Detailed"
