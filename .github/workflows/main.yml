name: myspace/myspace
on:
  push:
    branches:
    - master
  workflow_dispatch:
env:
  buildConfiguration: Release
  buildPlatform: Any CPU
  solution: "**/*.sln"
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1.2.0

    # THIS IS THE MISSING PIECE: Register the Azure feed with your secret token
    - name: Authenticate NuGet with Azure DevOps
      run: |
        nuget sources add -Name "AzureDevOps" -Source "https://pkgs.dev.azure.com/aishuraja20/_packaging/YOUR_FEED_ID/nuget/v3/index.json" -Username "n/a" -Password "${{ secrets.AZURE_DEVOPS_TOKEN }}" -StorePasswordInClearText

    - name: Restore NuGet Packages
      run: nuget restore ${{ env.solution }}

    - name: install msbuild
      uses: microsoft/setup-msbuild@v1.3.1

    - name: run msbuild
      run: msbuild ${{ env.solution }} /p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="${{ runner.temp }}" -p:Configuration=${{ env.buildConfiguration }} -p:Platform="${{ env.buildPlatform }}"

    - name: Run Tests
      uses: microsoft/vstest-action@v1.0.0
      with:
        testAssembly: |-
          **\*test*.dll
          !**\*TestAdapter.dll
          !**\obj\**
        searchFolder: "${{ github.workspace }}"
        platform: "${{ env.buildPlatform }}"

    - name: Publish Artifacts
      uses: actions/upload-artifact@v4.1.0
      with:
        name: drop
        path: "${{ runner.temp }}"
